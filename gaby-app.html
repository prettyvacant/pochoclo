const pad = n => String(n).padStart(2,"0");
const mkKey = (y,m,d) => `${y}-${pad(m+1)}-${pad(d)}`;
const firstDay = (y,m) => { const d=new Date(y,m,1).getDay(); return d===0?6:d-1; };
const daysIn = (y,m) => new Date(y,m+1,0).getDate();
const uid = () => Math.random().toString(36).slice(2,8);

function getTodayKey() {
  const n = new Date();
  return mkKey(n.getFullYear(), n.getMonth(), n.getDate());
}
function getTodayLabel() {
  const n = new Date();
  const dias = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
  return `${dias[n.getDay()]} ${n.getDate()} ${MESES[n.getMonth()]}`;
}

function last7() {
  const result = [];
  const n = new Date();
  for(let i=6;i>=0;i--) {
    const d = new Date(n.getFullYear(), n.getMonth(), n.getDate()-i);
    const dow = d.getDay();
    result.push({
      key: mkKey(d.getFullYear(), d.getMonth(), d.getDate()),
      label: DC[dow===0?6:dow-1],
      dia: d.getDate()
    });
  }
  return result;
}
